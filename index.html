<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VanGATE - Home</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a365d 0%, #2d3748 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            font-weight: 700;
        }
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-bottom: 40px;
        }
        .pages {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 800px;
        }
        .page-card {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 30px 40px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            min-width: 250px;
        }
        .page-card:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-5px);
        }
        .page-card h3 {
            font-size: 1.3rem;
            margin-bottom: 8px;
        }
        .page-card p {
            font-size: 0.9rem;
            opacity: 0.7;
        }
        .icon { font-size: 2rem; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>VanGATE</h1>
        <p class="subtitle">Corporate Website Prototype Showcase</p>
        
        <div class="pages">
            <a href="docs/prototypes/vangate-homepage-industrial-blue.html" class="page-card">
                <div class="icon">🏠</div>
                <h3>Homepage</h3>
                <p>Main landing page prototype</p>
            </a>
            <a href="docs/prototypes/solutions.html" class="page-card">
                <div class="icon">💡</div>
                <h3>Solutions</h3>
                <p>Solutions overview with tabs</p>
            </a>
            <a href="docs/prototypes/products.html" class="page-card">
                <div class="icon">📦</div>
                <h3>Products</h3>
                <p>Product catalog with filters</p>
            </a>
        </div>
    </div>
</body>
</html>
