<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solutions - VanGATE Manufacturing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #2563EB;
      --primary-dark: #1D4ED8;
      --primary-light: #3B82F6;
      --secondary: #0F172A;
      --surface: #1E293B;
      --surface-2: #334155;
      --text: #F8FAFC;
      --muted: #94A3B8;
      --border: #334155;
      --accent: #60A5FA;
      --success: #10B981;
      --font-heading: 'Bebas Neue', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-body-alt: 'Source Sans 3', sans-serif;
      --max-width: 1440px;
      --content-padding: 80px;
    }

    body {
      font-family: var(--font-body);
      background: var(--secondary);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Navigation */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
      padding: 0 var(--content-padding);
    }

    .nav-content {
      max-width: var(--max-width);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 80px;
    }

    .logo {
      display: flex;
      align-items: center;
      text-decoration: none;
      background: white;
      padding: 6px 12px;
      border-radius: 6px;
    }

    .logo img {
      height: 40px;
      width: auto;
    }

    .nav-links {
      display: flex;
      gap: 4px;
      list-style: none;
    }

    .nav-links > li {
      position: relative;
    }

    .nav-links a {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 28px 20px;
      display: block;
      transition: all 0.2s;
    }

    .nav-links a:hover { color: var(--primary); }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .nav-phone {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--primary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .nav-phone:hover { color: var(--accent); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-decoration: none;
      transition: all 0.25s;
      cursor: pointer;
      border: none;
      border-radius: 6px;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }

    .btn-outline {
      background: transparent;
      color: white;
      border: 2px solid var(--border);
    }

    .btn-outline:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(37, 99, 235, 0.1);
    }

    /* Page Hero */
    .page-hero {
      padding: 160px var(--content-padding) 80px;
      background: linear-gradient(135deg, var(--secondary) 0%, var(--surface) 100%);
      position: relative;
      overflow: hidden;
    }

    .page-hero::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 60%;
      height: 100%;
      background: radial-gradient(ellipse at center, rgba(37, 99, 235, 0.15) 0%, transparent 60%);
    }

    .page-hero-content {
      max-width: var(--max-width);
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .page-hero-tag {
      display: inline-block;
      padding: 8px 16px;
      background: rgba(37, 99, 235, 0.15);
      border: 1px solid var(--primary);
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 24px;
    }

    .page-hero h1 {
      font-family: var(--font-heading);
      font-size: 4rem;
      line-height: 1.1;
      color: white;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .page-hero h1 span { color: var(--primary); }

    .page-hero p {
      font-size: 1.2rem;
      color: var(--muted);
      max-width: 600px;
      margin-bottom: 32px;
      line-height: 1.7;
    }

    .page-hero-breadcrumb {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .page-hero-breadcrumb a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .page-hero-breadcrumb a:hover { color: var(--primary); }

    /* Solutions Overview */
    .solutions-overview {
      padding: 80px var(--content-padding);
      background: var(--surface);
    }

    .solutions-overview-content {
      max-width: var(--max-width);
      margin: 0 auto;
    }

    .solutions-nav-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 48px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      padding-bottom: 24px;
    }

    .solution-tab {
      padding: 14px 28px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s;
    }

    .solution-tab:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .solution-tab.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .solution-detail {
      display: none;
    }

    .solution-detail.active {
      display: block;
    }

    .solution-detail-header {
      display: flex;
      align-items: flex-start;
      gap: 32px;
      margin-bottom: 48px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }

    .solution-icon-large {
      font-size: 4rem;
      flex-shrink: 0;
    }

    .solution-title-area h2 {
      font-family: var(--font-heading);
      font-size: 2.5rem;
      color: white;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .solution-title-area p {
      font-size: 1.1rem;
      color: var(--muted);
      max-width: 600px;
    }

    .solution-products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .solution-product-card {
      background: var(--secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      transition: all 0.3s;
    }

    .solution-product-card:hover {
      border-color: var(--primary);
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .product-icon {
      font-size: 2.5rem;
      margin-bottom: 20px;
    }

    .solution-product-card h3 {
      font-size: 1.25rem;
      font-weight: 600;
      color: white;
      margin-bottom: 12px;
    }

    .solution-product-card > p {
      font-size: 0.95rem;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .solution-product-card ul {
      list-style: none;
      margin-bottom: 24px;
    }

    .solution-product-card li {
      font-size: 0.9rem;
      color: var(--muted);
      padding: 6px 0;
      padding-left: 20px;
      position: relative;
    }

    .solution-product-card li::before {
      content: '✓';
      position: absolute;
      left: 0;
      color: var(--primary);
    }

    .solution-product-card .btn {
      width: 100%;
      justify-content: center;
    }

    /* Why VanGATE */
    .why-vangate-section {
      padding: 80px var(--content-padding);
      background: var(--secondary);
    }

    .why-vangate-content {
      max-width: var(--max-width);
      margin: 0 auto;
    }

    .why-vangate-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .why-vangate-header h2 {
      font-family: var(--font-heading);
      font-size: 2.8rem;
      color: white;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .why-vangate-header h2 span { color: var(--primary); }

    .why-vangate-header p {
      font-size: 1.1rem;
      color: var(--muted);
    }

    .why-vangate-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }

    .why-vangate-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      transition: all 0.3s;
    }

    .why-vangate-card:hover {
      border-color: var(--primary);
      transform: translateY(-4px);
    }

    .why-vangate-icon {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    .why-vangate-card h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: white;
      margin-bottom: 12px;
    }

    .why-vangate-card p {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.6;
    }

    /* CTA Section */
    .cta-section {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      padding: 80px var(--content-padding);
      text-align: center;
    }

    .cta-content {
      max-width: 700px;
      margin: 0 auto;
    }

    .cta-content h2 {
      font-family: var(--font-heading);
      font-size: 3rem;
      color: white;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .cta-content p {
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 32px;
    }

    .cta-buttons {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .cta-section .btn-outline {
      border-color: white;
      color: white;
    }

    .cta-section .btn-outline:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    /* Footer */
    .footer {
      background: var(--secondary);
      padding: 64px var(--content-padding) 32px;
      border-top: 1px solid var(--border);
    }

    .footer-content {
      max-width: var(--max-width);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.8fr 1fr 1fr 1fr;
      gap: 48px;
    }

    .footer-brand img {
      height: 40px;
      width: auto;
      margin-bottom: 16px;
      background: white;
      padding: 6px 12px;
      border-radius: 6px;
    }

    .footer-brand p {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 28px;
      max-width: 360px;
    }

    .footer-links h4 {
      font-size: 0.85rem;
      font-weight: 600;
      color: white;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 20px;
    }

    .footer-links ul {
      list-style: none;
    }

    .footer-links li {
      margin-bottom: 12px;
    }

    .footer-links a {
      font-size: 0.875rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: white; }

    .footer-bottom {
      max-width: var(--max-width);
      margin: 48px auto 0;
      padding-top: 32px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-bottom p {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .footer-social {
      display: flex;
      gap: 10px;
    }

    .footer-social a {
      width: 40px;
      height: 40px;
      background: var(--surface);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      text-decoration: none;
      transition: all 0.25s;
    }

    .footer-social a:hover {
      background: var(--primary);
      color: white;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .why-vangate-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 768px) {
      :root {
        --content-padding: 20px;
      }

      .nav-links {
        display: none;
      }

      /* Mobile Menu Button */
      .mobile-menu-btn {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 44px;
        height: 44px;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        cursor: pointer;
        gap: 5px;
        padding: 10px;
      }

      .mobile-menu-btn span {
        display: block;
        width: 20px;
        height: 2px;
        background: var(--text);
        transition: all 0.3s;
        border-radius: 1px;
      }

      .mobile-menu-btn.active span:nth-child(1) {
        transform: rotate(45deg) translate(5px, 5px);
      }

      .mobile-menu-btn.active span:nth-child(2) {
        opacity: 0;
      }

      .mobile-menu-btn.active span:nth-child(3) {
        transform: rotate(-45deg) translate(5px, -5px);
      }

      /* Mobile Navigation Overlay */
      .mobile-nav {
        position: fixed;
        top: 80px;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(15, 23, 42, 0.98);
        backdrop-filter: blur(20px);
        z-index: 999;
        overflow-y: auto;
        transform: translateX(100%);
        transition: transform 0.3s ease;
      }

      .mobile-nav.active {
        transform: translateX(0);
      }

      .mobile-nav-content {
        padding: 24px;
      }

      .mobile-nav-links {
        list-style: none;
      }

      .mobile-nav-links li {
        border-bottom: 1px solid var(--border);
      }

      .mobile-nav-links a {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 0;
        color: var(--text);
        text-decoration: none;
        font-size: 1rem;
        font-weight: 500;
      }

      .mobile-nav-actions {
        margin-top: 24px;
        padding-top: 24px;
        border-top: 1px solid var(--border);
      }

      .mobile-nav-actions .btn {
        width: 100%;
        justify-content: center;
        padding: 14px;
      }

      .page-hero {
        padding: 140px var(--content-padding) 60px;
      }

      .page-hero h1 {
        font-size: 2.2rem;
      }

      .page-hero p {
        font-size: 1rem;
      }

      .solutions-nav-tabs {
        display: flex;
        overflow-x: auto;
        gap: 10px;
        margin-bottom: 32px;
        padding-bottom: 16px;
        flex-wrap: nowrap;
        -webkit-overflow-scrolling: touch;
        scroll-snap-type: x mandatory;
        border-bottom: none;
      }

      .solution-tab {
        flex-shrink: 0;
        padding: 12px 20px;
        font-size: 0.85rem;
        scroll-snap-align: start;
      }

      .solution-detail-header {
        flex-direction: column;
        gap: 20px;
        margin-bottom: 32px;
        padding-bottom: 24px;
      }

      .solution-icon-large {
        font-size: 3rem;
      }

      .solution-title-area h2 {
        font-size: 1.8rem;
      }

      .solution-title-area p {
        font-size: 1rem;
      }

      .solution-products-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .solution-product-card {
        padding: 24px;
      }

      .why-vangate-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .why-vangate-header h2 {
        font-size: 2rem;
      }

      .why-vangate-card {
        padding: 24px;
      }

      .cta-section {
        padding: 60px var(--content-padding);
      }

      .cta-content h2 {
        font-size: 2rem;
      }

      .cta-content p {
        font-size: 1rem;
      }

      .cta-buttons {
        flex-direction: column;
        gap: 12px;
      }

      .cta-buttons .btn {
        width: 100%;
        justify-content: center;
      }

      .footer-content {
        grid-template-columns: 1fr;
        gap: 32px;
      }

      .footer-bottom {
        flex-direction: column;
        gap: 20px;
        text-align: center;
      }
    }

    @media (max-width: 480px) {
      :root {
        --content-padding: 16px;
      }

      .nav-content {
        height: 64px;
      }

      .logo img {
        height: 32px;
      }

      .page-hero {
        padding: 120px var(--content-padding) 48px;
      }

      .page-hero h1 {
        font-size: 1.8rem;
      }

      .page-hero-tag {
        font-size: 0.75rem;
        padding: 6px 12px;
      }

      .solution-tab {
        padding: 10px 16px;
        font-size: 0.8rem;
      }

      .solution-icon-large {
        font-size: 2.5rem;
      }

      .solution-title-area h2 {
        font-size: 1.5rem;
      }

      .why-vangate-header h2 {
        font-size: 1.8rem;
      }

      .why-vangate-icon {
        font-size: 2.5rem;
      }

      .cta-content h2 {
        font-size: 1.8rem;
      }
    }

    /* Safe area insets */
    @supports (padding: max(0px)) {
      .mobile-nav {
        padding-bottom: max(20px, env(safe-area-inset-bottom));
      }
    }
</head>

  <script>
    // Mobile Menu
    document.addEventListener('DOMContentLoaded', function() {
      var menuBtn = document.getElementById('mobileMenuBtn');
      var mobileNav = document.getElementById('mobileNav');

      if (menuBtn && mobileNav) {
        menuBtn.addEventListener('click', function() {
          menuBtn.classList.toggle('active');
          mobileNav.classList.toggle('active');
          document.body.style.overflow = mobileNav.classList.contains('active') ? 'hidden' : '';
        });

        // Close menu on link click
        mobileNav.querySelectorAll('a').forEach(function(link) {
          link.addEventListener('click', function() {
            menuBtn.classList.remove('active');
            mobileNav.classList.remove('active');
            document.body.style.overflow = '';
          });
        });
      }

      // Solution tabs
      document.querySelectorAll('.solution-tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
          var target = this.dataset.tab;

          // Update active tab
          document.querySelectorAll('.solution-tab').forEach(function(t) {
            t.classList.remove('active');
          });
          this.classList.add('active');

          // Update active content
          document.querySelectorAll('.solution-detail').forEach(function(detail) {
            detail.classList.remove('active');
          });
          document.getElementById(target).classList.add('active');
        });
      });
    });
  </script>
